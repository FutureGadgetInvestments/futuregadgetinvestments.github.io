# config.yml

backend:
  name: git
  repository: FutureGadgetInvestments/futuregadgetinvestments.github.io
  branch: main # Branch to update (optional; defaults to master)
media_folder: 'assets/uploads'
collections:
  - name: 'blog'
    label: 'Blog'
    folder: '_posts/'
    fields:
      - { name: Title }